let currentQuestion = 0;
let answers = Array(questions.length).fill(0);
let chartInstance = null;

function startQuiz() {
    document.getElementById('cover').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    renderQuestion();
}

function renderQuestion() {
    const q = questions[currentQuestion];
    document.getElementById('question-text').innerText = q.q;
    const optContainer = document.getElementById('options-container');
    optContainer.innerHTML = '';
    
    q.o.forEach((option, idx) => {
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        btn.innerText = option;
        btn.onclick = () => selectOption(idx);
        optContainer.appendChild(btn);
    });

    const progress = ((currentQuestion + 1) / questions.length) * 100;
    document.getElementById('progress-bar').style.width = progress + '%';
    document.getElementById('progress-text').innerText = `${currentQuestion + 1}/${questions.length}`;
}

function selectOption(idx) {
    answers[currentQuestion] = idx;
    currentQuestion++;
    if (currentQuestion >= questions.length) showResult();
    else renderQuestion();
}

function showResult() {
    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    
    const scores = perfumes.map(() => 0);
    answers.forEach((a, i) => {
        const key = i % 12;
        scores[key] += (a + 1) * 10;
    });

    let max = 0, res = perfumes[0];
    scores.forEach((s, i) => {
        if (s > max) { max = s; res = perfumes[i]; }
    });

    document.getElementById('result-name').innerText = res.name;
    document.getElementById('result-tag').innerText = res.tag;
    document.getElementById('result-top').innerText = res.top;
    document.getElementById('result-middle').innerText = res.middle;
    document.getElementById('result-base').innerText = res.base;
    document.getElementById('result-desc').innerText = res.desc;

    const ctx = document.getElementById('barChart').getContext('2d');
    const labels = Object.keys(res.traits);
    const values = Object.values(res.traits);
    
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '你的香气维度',
                data: values,
                backgroundColor: '#FF8DA1',
                borderColor: '#FF698D',
                borderWidth: 1,
                borderRadius: 10
            }]
        },
        options: {
            indexAxis: 'y',
            scales: { x: { beginAtZero: true, max: 100 } },
            plugins: { legend: { display: false } }
        }
    });
}

function restartQuiz() {
    currentQuestion = 0;
    answers = Array(questions.length).fill(0);
    document.getElementById('result').classList.add('hidden');
    document.getElementById('cover').classList.remove('hidden');
}
